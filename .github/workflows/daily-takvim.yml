name: Gunluk Dashboard

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 01:00 EDT (gece yarısı sonrası)
  workflow_dispatch:        # Elle tetikleme

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ImageMagick kur
        run: sudo apt-get install -y imagemagick

      - name: Puppeteer kur
        run: npm install puppeteer

      - name: PNG olustur
        run: node generate.js

      - name: Gri tonlamaya cevir (Kindle icin)
        run: |
          convert screensaver.png \
            -colorspace Gray \
            -depth 8 \
            -resize 600x800! \
            screensaver.png
          echo "Boyut: $(identify -format '%wx%h' screensaver.png)"

      - name: Commit
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "action@github.com"
          git add screensaver.png
          git diff --staged --quiet && echo "Degisiklik yok" || \
            git commit -m "Dashboard: $(TZ='America/New_York' date '+%d %B %Y')"
          git push
