<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=600">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:600px;height:800px;overflow:hidden;background:#fff;color:#000;}

body{
  font-family:'Source Sans 3',sans-serif;
  border:6px solid #000;
  display:flex;flex-direction:column;
}

/* ── TOP: Saatler + Hava ─────────────────────────── */
.top{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  border-bottom:2px solid #000;
  height:108px;
}
.clock-box{
  padding:10px 14px 6px;
  display:flex;flex-direction:column;justify-content:center;
}
.clock-box.right{text-align:right;}
/* SAAT ALANI — fbink bu alana yazar, boş bırakıyoruz */
.clock-time{
  font-family:'Playfair Display',serif;
  font-size:52px;font-weight:700;
  line-height:1;
  min-height:58px; /* fbink overlay alanı */
}
.clock-label{
  font-size:13px;font-weight:600;
  margin-top:4px;letter-spacing:0.5px;
}
.weather-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-left:2px solid #000;border-right:2px solid #000;
  padding:8px 12px;min-width:140px;
}
.weather-icon{font-size:28px;line-height:1;}
.weather-temp{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:700;line-height:1.1;
}
.weather-desc{font-size:11px;color:#333;margin-top:2px;text-align:center;}

/* ── MAIN: Namaz | Tarih | Hava ────────────────── */
.main{
  display:grid;
  grid-template-columns:118px 1fr 128px;
  flex:1;border-bottom:2px solid #000;
  overflow:hidden;
}

/* Namaz Vakitleri */
.prayer-box{
  border-right:2px solid #000;
  padding:8px 0 4px;
  display:flex;flex-direction:column;
}
.prayer-box h3{
  font-size:11px;font-weight:700;text-align:center;
  letter-spacing:0.5px;padding-bottom:6px;
  border-bottom:1px solid #000;margin:0 8px 6px;
}
.prayer-row{
  display:flex;flex-direction:column;
  align-items:center;padding:3px 8px;
  flex:1;
}
.prayer-row+.prayer-row{border-top:1px solid #eee;}
.prayer-name{font-size:11px;font-weight:600;}
.prayer-time{font-size:15px;font-weight:700;font-family:'Playfair Display',serif;}

/* Orta: Tarih */
.date-center{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 8px;
}
.month-name{
  font-family:'Playfair Display',serif;
  font-size:52px;font-weight:900;
  letter-spacing:4px;line-height:1;
  margin-top:-8px;
}
.day-number{
  font-family:'Playfair Display',serif;
  font-size:220px;font-weight:900;
  line-height:0.85;
  margin:-10px 0 -16px;
}
.day-name{
  font-family:'Playfair Display',serif;
  font-size:38px;font-weight:700;
  letter-spacing:3px;line-height:1;
}

/* Hava Durumu */
.weather-box{
  border-left:2px solid #000;
  padding:8px 0 4px;
  display:flex;flex-direction:column;
}
.weather-box h3{
  font-size:11px;font-weight:700;text-align:center;
  letter-spacing:0.5px;padding-bottom:6px;
  border-bottom:1px solid #000;margin:0 8px 6px;
}
.weather-row{
  display:flex;flex-direction:column;
  align-items:center;padding:2px 8px;
  flex:1;
}
.weather-row+.weather-row{border-top:1px solid #eee;}
.weather-day{font-size:11px;font-weight:600;}
.weather-wi{font-size:14px;line-height:1.2;}
.weather-wtemp{font-size:14px;font-weight:700;font-family:'Playfair Display',serif;}

/* ── ALT: Özel Gün + Söz ───────────────────────── */
.special-day{
  border-bottom:1px solid #000;
  padding:5px 16px;text-align:center;
  font-size:13px;font-weight:700;
  min-height:26px;
}
.quote{
  padding:6px 20px;text-align:center;
  font-size:12px;line-height:1.45;
  font-style:italic;flex:1;
  display:flex;align-items:center;justify-content:center;
}

/* ── BOTTOM BAR ────────────────────────────────── */
.bottom-bar{
  height:44px;
  border-top:2px solid #000;
  display:flex;align-items:center;
  padding:0 8px;gap:6px;
}
.btn{
  border:2px solid #000;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  padding:4px 8px;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;height:30px;
}
.btn.icon-btn{min-width:32px;padding:4px 6px;}
.btn.dark{background:#000;color:#fff;}

.battery-area{
  display:flex;align-items:center;gap:4px;
  font-size:13px;font-weight:600;
  min-width:72px;
  /* fbink bu alana yazar */
}
.battery-icon{font-size:16px;}

.btn-group{
  display:flex;border:2px solid #000;border-radius:6px;overflow:hidden;
  height:30px;
}
.btn-group .seg{
  padding:4px 8px;font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;min-width:28px;
}
.btn-group .seg+.seg{border-left:1px solid #000;}
.btn-group .seg.active{background:#000;color:#fff;}

.spacer{flex:1;}
</style>
</head>
<body>

<!-- TOP: Saatler + Anlık Hava -->
<div class="top">
  <div class="clock-box left">
    <div class="clock-time" id="local-time"><!-- fbink --></div>
    <div class="clock-label">Yerel Saat</div>
  </div>
  <div class="weather-center">
    <div class="weather-icon" id="cur-icon">☀️</div>
    <div class="weather-temp" id="cur-temp">--°</div>
    <div class="weather-desc" id="cur-desc">Reston, VA</div>
  </div>
  <div class="clock-box right">
    <div class="clock-time" id="tr-time"><!-- fbink --></div>
    <div class="clock-label">Türkiye Saati</div>
  </div>
</div>

<!-- MAIN: Namaz | Tarih | Hava Tahmini -->
<div class="main">
  <!-- Namaz -->
  <div class="prayer-box">
    <h3>NAMAZ</h3>
    <div class="prayer-row"><span class="prayer-name">İmsak</span><span class="prayer-time" id="p-imsak">--:--</span></div>
    <div class="prayer-row"><span class="prayer-name">Güneş</span><span class="prayer-time" id="p-gunes">--:--</span></div>
    <div class="prayer-row"><span class="prayer-name">Öğle</span><span class="prayer-time" id="p-ogle">--:--</span></div>
    <div class="prayer-row"><span class="prayer-name">İkindi</span><span class="prayer-time" id="p-ikindi">--:--</span></div>
    <div class="prayer-row"><span class="prayer-name">Akşam</span><span class="prayer-time" id="p-aksam">--:--</span></div>
    <div class="prayer-row"><span class="prayer-name">Yatsı</span><span class="prayer-time" id="p-yatsi">--:--</span></div>
  </div>

  <!-- Tarih -->
  <div class="date-center">
    <div class="month-name" id="month-name">TEMMUZ</div>
    <div class="day-number" id="day-number">23</div>
    <div class="day-name" id="day-name">PERŞEMBE</div>
  </div>

  <!-- Hava Tahmini -->
  <div class="weather-box">
    <h3>HAVA</h3>
    <div class="weather-row" id="w0"><span class="weather-day">Yarın</span><span class="weather-wi">⛅</span><span class="weather-wtemp">--°</span></div>
    <div class="weather-row" id="w1"><span class="weather-day">--</span><span class="weather-wi">⛅</span><span class="weather-wtemp">--°</span></div>
    <div class="weather-row" id="w2"><span class="weather-day">--</span><span class="weather-wi">⛅</span><span class="weather-wtemp">--°</span></div>
    <div class="weather-row" id="w3"><span class="weather-day">--</span><span class="weather-wi">⛅</span><span class="weather-wtemp">--°</span></div>
    <div class="weather-row" id="w4"><span class="weather-day">--</span><span class="weather-wi">⛅</span><span class="weather-wtemp">--°</span></div>
  </div>
</div>

<!-- Özel Gün -->
<div class="special-day" id="special-day"></div>

<!-- Özlü Söz -->
<div class="quote" id="quote">Bir dilin sınırları dünyanın sınırlarıdır. — Wittgenstein</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="btn icon-btn" id="btn-exit">✕</div>
  <div class="battery-area">
    <span class="battery-icon">🔋</span>
    <span id="battery-pct">--%</span>
  </div>
  <div class="btn-group" id="unit-toggle">
    <div class="seg active" id="btn-c">°C</div>
    <div class="seg" id="btn-f">°F</div>
  </div>
  <div class="btn-group" id="bright-ctrl">
    <div class="seg" id="br-off">○</div>
    <div class="seg active" id="br-lo">☼</div>
    <div class="seg" id="br-hi">☀</div>
  </div>
  <div class="spacer"></div>
  <div class="btn-group" id="theme-toggle">
    <div class="seg active" id="btn-light">☀</div>
    <div class="seg" id="btn-dark">☾</div>
  </div>
</div>

<script>
/* =========================================================
   AYARLAR — GitHub Actions bu değerleri değiştirir
   ========================================================= */
var CONFIG = {
  lat: 38.9586,
  lng: -77.3570,
  tz: -4,           // EDT (yaz) / -5 kış — Actions güncel değeri koyar
  city: "Reston, VA",
  useFahrenheit: false
};

/* =========================================================
   TAKVİM — Türkçe isimler
   ========================================================= */
var AY = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN",
          "TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
var GUN = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
var GUN_KISA = ["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];

/* =========================================================
   ÖZEL GÜNLER
   ========================================================= */
var OZEL = {
  "01-01":"Yılbaşı","03-08":"Dünya Kadınlar Günü","03-18":"Çanakkale Zaferi",
  "04-23":"Ulusal Egemenlik ve Çocuk Bayramı","05-01":"İşçi Bayramı",
  "05-19":"Atatürk'ü Anma, Gençlik ve Spor Bayramı",
  "08-30":"Zafer Bayramı","09-13":"Sakarya'nın Kurtuluşu",
  "10-29":"Cumhuriyet Bayramı"
};

/* =========================================================
   ÖZLÜ SÖZLER
   ========================================================= */
var SOZLER = [
  "Bir dilin sınırları dünyanın sınırlarıdır. — Wittgenstein",
  "Bilgi güçtür. — Francis Bacon",
  "Düşünüyorum, öyleyse varım. — Descartes",
  "İnsan ancak çalışmakla insan olur. — Mevlana",
  "Sabır acıdır ama meyvesi tatlıdır. — Rousseau",
  "En büyük zafer nefsi yenmektir. — Platon",
  "Adalet mülkün temelidir. — Hz. Ömer",
  "Kalem kılıçtan keskindir. — Bulwer-Lytton",
  "Hayat ileriye yaşanır, geriye anlaşılır. — Kierkegaard",
  "İlim, Çin'de de olsa gidip alınız. — Hz. Muhammed",
  "Umut, uyanık insanın rüyasıdır. — Aristoteles",
  "Gülü seven dikenine katlanır. — Atasözü",
  "Dost kara günde belli olur. — Atasözü",
  "Akıl yaşta değil baştadır. — Atasözü",
  "Sağlam kafa sağlam vücutta bulunur. — Juvenalis",
  "Merhamet dünyanın ilacıdır. — Yunus Emre",
  "Vakit nakittir. — Benjamin Franklin",
  "Cehalet en büyük düşmandır. — Galileo",
  "Okumak zihni özgürleştirir. — Voltaire",
  "Emek olmadan yemek olmaz. — Atasözü"
];

/* =========================================================
   HAVA DURUMU İKONLARI (wttr.in kodu → unicode)
   ========================================================= */
var WI = {
  113:"☀️",116:"⛅",119:"☁️",122:"☁️",143:"🌫️",
  176:"🌦️",179:"🌨️",182:"🌨️",185:"🌨️",200:"⛈️",
  227:"❄️",230:"❄️",248:"🌫️",260:"🌫️",
  263:"🌦️",266:"🌦️",281:"🌧️",284:"🌧️",
  293:"🌦️",296:"🌦️",299:"🌧️",302:"🌧️",
  305:"🌧️",308:"🌧️",311:"🌧️",314:"🌧️",
  317:"🌨️",320:"🌨️",323:"🌨️",326:"❄️",
  329:"❄️",332:"❄️",335:"❄️",338:"❄️",
  350:"🌧️",353:"🌦️",356:"🌧️",359:"🌧️",
  362:"🌨️",365:"🌨️",368:"🌨️",371:"❄️",
  374:"🌨️",377:"🌨️",386:"⛈️",389:"⛈️",
  392:"⛈️",395:"❄️"
};

/* =========================================================
   NAMAZ VAKTİ HESAPLAMA (Reston, VA — offline)
   ========================================================= */
function dtr(d){return d*Math.PI/180;}
function rtd(r){return r*180/Math.PI;}
function dsin(d){return Math.sin(dtr(d));}
function dcos(d){return Math.cos(dtr(d));}
function dtan(d){return Math.tan(dtr(d));}
function darccos(x){return rtd(Math.acos(x));}
function darctan2(y,x){return rtd(Math.atan2(y,x));}
function darccot(x){return rtd(Math.atan(1/x));}
function fixH(a){a=a-24*Math.floor(a/24);return a<0?a+24:a;}
function fixA(a){a=a-360*Math.floor(a/360);return a<0?a+360:a;}

function sunPos(jd){
  var D=jd-2451545;
  var g=fixA(357.529+0.98560028*D);
  var q=fixA(280.459+0.98564736*D);
  var L=fixA(q+1.915*dsin(g)+0.020*dsin(2*g));
  var e=23.439-0.00000036*D;
  var decl=rtd(Math.asin(dsin(e)*dsin(L)));
  var RA=fixH(darctan2(dcos(e)*dsin(L),dcos(L))/15);
  return{decl:decl,eqt:q/15-RA};
}
function jd(y,m,d){
  if(m<=2){y--;m+=12;}
  var A=Math.floor(y/100);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+2-A+Math.floor(A/4)-1524.5;
}
function prayTimes(y,m,d,lat,lng,tz){
  var jdn=jd(y,m,d)-lng/(15*24);
  function midDay(t){return fixH(12-sunPos(jdn+t).eqt);}
  function angT(angle,t,ccw){
    var decl=sunPos(jdn+t).decl;
    var noon=midDay(t);
    var x=(-dsin(angle)-dsin(decl)*dsin(lat))/(dcos(decl)*dcos(lat));
    return noon+(ccw?-1:1)*(1/15*darccos(x));
  }
  function asrT(t){
    var decl=sunPos(jdn+t).decl;
    var angle=-darccot(1+dtan(Math.abs(lat-decl)));
    return angT(angle,t,false);
  }
  function loc(t){return fixH(t+tz-lng/15);}
  function fmt(t){
    t=loc(t)+0.5/60;
    var h=Math.floor(t);
    var mn=Math.floor((t-h)*60);
    return(h<10?"0":"")+h+":"+(mn<10?"0":"")+mn;
  }
  return{
    Imsak: fmt(angT(18,5/24,true)),
    Gunes: fmt(angT(0.833,6/24,true)),
    Ogle:  fmt(midDay(12/24)),
    Ikindi:fmt(asrT(13/24)),
    Aksam: fmt(angT(0.833,18/24,false)),
    Yatsi: fmt(angT(17,18/24,false))
  };
}

/* =========================================================
   RENDER
   ========================================================= */
function dayOfYear(y,m,d){
  var s=Date.UTC(y,0,0);
  var n=Date.UTC(y,m-1,d);
  return Math.round((n-s)/86400000);
}

function render(){
  var now=new Date();
  // GitHub Actions UTC'de çalışır; timezone'u hesapla
  // Puppeteer'da tarih UTC+0, CONFIG.tz ile yerel saate çevir
  var local=new Date(now.getTime()+CONFIG.tz*3600000);
  var y=local.getUTCFullYear();
  var m=local.getUTCMonth()+1;
  var d=local.getUTCDate();
  var dow=local.getUTCDay();

  // Tarih
  document.getElementById('month-name').textContent=AY[m-1];
  document.getElementById('day-number').textContent=d;
  document.getElementById('day-name').textContent=GUN[dow];

  // Özel gün
  var mmdd=(m<10?"0":"")+m+"-"+(d<10?"0":"")+d;
  document.getElementById('special-day').textContent=OZEL[mmdd]||"";

  // Söz
  document.getElementById('quote').textContent=SOZLER[dayOfYear(y,m,d)%SOZLER.length];

  // Namaz vakitleri
  var p=prayTimes(y,m,d,CONFIG.lat,CONFIG.lng,CONFIG.tz);
  document.getElementById('p-imsak').textContent=p.Imsak;
  document.getElementById('p-gunes').textContent=p.Gunes;
  document.getElementById('p-ogle').textContent=p.Ogle;
  document.getElementById('p-ikindi').textContent=p.Ikindi;
  document.getElementById('p-aksam').textContent=p.Aksam;
  document.getElementById('p-yatsi').textContent=p.Yatsi;

  // Saat — Puppeteer'da boş bırak, Kindle fbink yazar
  document.getElementById('local-time').textContent='';
  document.getElementById('tr-time').textContent='';
  document.getElementById('battery-pct').textContent='';

  // Hava — GitHub Actions fetch eder, buraya yazar
  // (generate.js bu değerleri DOM'a enjekte eder)
}

render();
</script>
